spring.application.name=LearnAuthentication

# Data source (use env vars for production)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;NON_KEYWORDS=USER}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.defer-datasource-initialization=true
spring.data.jpa.repositories.bootstrap-mode=default
spring.jpa.open-in-view=false

# H2 console disabled by default for production safety
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# JWT and refresh token config
security.jwt.secret=${JWT_SECRET:357638792F423F4428472B4B6250655368566D597133743677397A2443264629}
security.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
security.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
app.swagger.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.customJs=/swagger-custom.js

# Actuator
management.endpoints.web.base-path=/monitoring
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.endpoint.springVersion.enabled=true
management.endpoints.web.exposure.include=health,info,springVersion
management.endpoint.health.probes.enabled=true

# Error response hygiene
server.error.include-message=never
server.error.include-binding-errors=never
