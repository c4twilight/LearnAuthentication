<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swagger Login</title>
    <style>
        :root { --bg:#f3f7f9; --card:#fff; --text:#14212e; --muted:#5e6b78; --accent:#0f766e; --neutral:#334155; --danger:#b91c1c; --ok:#166534; --border:#d7e0e7; }
        body { margin:0; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; background:radial-gradient(circle at top right,#e2f7f4,var(--bg)); color:var(--text); min-height:100vh; display:grid; place-items:center; padding:16px; }
        .card { width:100%; max-width:460px; background:var(--card); border:1px solid var(--border); border-radius:14px; box-shadow:0 10px 30px rgba(20,33,46,.08); padding:24px; }
        h1 { margin:0 0 8px; font-size:24px; }
        p { margin:0 0 16px; color:var(--muted); }
        .section { margin-top:16px; padding-top:10px; border-top:1px solid var(--border); }
        .section h2 { margin:0 0 8px; font-size:16px; }
        label { display:block; font-size:14px; margin:10px 0 6px; }
        input, textarea { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--border); border-radius:10px; font-size:14px; }
        textarea { min-height:90px; resize:vertical; }
        button { width:100%; margin-top:10px; padding:10px 12px; border:none; border-radius:10px; font-size:14px; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
        .secondary { background:var(--neutral); }
        .error { margin-top:10px; min-height:18px; color:var(--danger); font-size:13px; }
        .success { margin-top:10px; min-height:18px; color:var(--ok); font-size:13px; }
        .hint { margin-top:10px; font-size:12px; color:var(--muted); }
        .status { margin-top:10px; min-height:18px; color:var(--neutral); font-size:13px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Swagger Auth</h1>
    <p>Option 1: login with username/password. Option 2: paste an existing JWT.</p>

    <div class="section">
        <h2>Option 1: Login Credentials</h2>
        <form id="loginForm">
            <label for="username">Username</label>
            <input id="username" name="username" required />

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required />

            <button type="submit">Login And Open Swagger</button>
        </form>
    </div>

    <div class="section">
        <h2>Option 2: Use Existing JWT</h2>
        <label for="jwtToken">JWT Token</label>
        <textarea id="jwtToken" placeholder="Paste JWT access token here"></textarea>
        <button id="useJwt" type="button">Use JWT And Open Swagger</button>
    </div>

    <div class="section">
        <button id="openSwagger" class="secondary" type="button">Open Swagger With Saved Token</button>
        <button id="logoutSwagger" class="secondary" type="button">Logout From Swagger</button>
    </div>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <div class="status" id="status"></div>
    <div class="hint">Token is stored in browser local storage for Swagger only.</div>
</div>

<script>
(function () {
    var TOKEN_KEY = "learn_auth_swagger_token";
    var REFRESH_KEY = "learn_auth_refresh_token";

    var form = document.getElementById("loginForm");
    var openSwaggerBtn = document.getElementById("openSwagger");
    var logoutSwaggerBtn = document.getElementById("logoutSwagger");
    var useJwtBtn = document.getElementById("useJwt");
    var jwtTokenField = document.getElementById("jwtToken");
    var errorEl = document.getElementById("error");
    var successEl = document.getElementById("success");
    var statusEl = document.getElementById("status");
    var loginSubmitBtn = form.querySelector("button[type='submit']");

    function setStatus(message) {
        statusEl.textContent = message || "";
    }

    function setLoading(isLoading) {
        loginSubmitBtn.disabled = isLoading;
        loginSubmitBtn.textContent = isLoading ? "Authenticating..." : "Login And Open Swagger";
    }

    function setError(message) {
        errorEl.textContent = message || "";
        if (message) {
            successEl.textContent = "";
            setStatus("Login failed.");
        }
    }

    function setSuccess(message) {
        successEl.textContent = message || "";
        if (message) {
            errorEl.textContent = "";
            setStatus("Login successful.");
        }
    }

    function extractMessage(payload) {
        if (!payload || typeof payload !== "object") {
            return "";
        }
        return payload.message || payload.error || payload.payload || "";
    }

    function saveToken(token) {
        localStorage.setItem(TOKEN_KEY, token);
    }

    function normalizeToken(token) {
        var value = (token || "").trim();
        if (value.toLowerCase().startsWith("bearer ")) {
            value = value.substring(7).trim();
        }
        return value;
    }

    async function validateToken(token) {
        try {
            var response = await fetch("/api/v1/ping1", {
                method: "GET",
                headers: { "Authorization": "Bearer " + token }
            });
            return response.ok;
        } catch (error) {
            return false;
        }
    }

    async function openSwaggerAndAuthorize(token, options) {
        var settings = options || {};
        var shouldValidate = settings.validate !== false;
        var normalizedToken = normalizeToken(token);
        if (!normalizedToken) {
            setError("Token is empty.");
            return;
        }

        if (shouldValidate) {
            setStatus("Validating token...");
            var isValid = await validateToken(normalizedToken);
            if (!isValid) {
                setError("Invalid or expired JWT token.");
                return;
            }
        }

        saveToken(normalizedToken);
        var swaggerWindow = window.open("/swagger-auth-ui.html", "_blank");
        if (!swaggerWindow) {
            setError("Popup blocked. Please allow popups for localhost.");
            return;
        }

        var attempts = 0;
        var timer = setInterval(function () {
            attempts += 1;
            try {
                if (swaggerWindow.closed) {
                    clearInterval(timer);
                    return;
                }
                if (swaggerWindow.ui && typeof swaggerWindow.ui.preauthorizeApiKey === "function") {
                    swaggerWindow.ui.preauthorizeApiKey("bearerAuth", normalizedToken);
                    setSuccess("Swagger opened and token injected.");
                    clearInterval(timer);
                    return;
                }
            } catch (error) {
                // Ignore temporary access errors until Swagger fully loads.
            }

            if (attempts >= 120) {
                clearInterval(timer);
                setSuccess("Swagger opened. If token was not auto-filled, click Authorize once.");
            }
        }, 250);
    }

    openSwaggerBtn.addEventListener("click", function () {
        openSwaggerAndAuthorize(localStorage.getItem(TOKEN_KEY));
    });

    logoutSwaggerBtn.addEventListener("click", function () {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(REFRESH_KEY);
        setSuccess("Swagger token cleared from browser storage.");
    });

    useJwtBtn.addEventListener("click", function () {
        var token = (jwtTokenField.value || "").trim();
        if (!token) {
            setError("Please paste a JWT token first.");
            return;
        }
        setSuccess("JWT received. Checking token...");
        setStatus("Trying to open Swagger using pasted token.");
        openSwaggerAndAuthorize(token);
    });

    form.addEventListener("submit", async function (event) {
        event.preventDefault();
        setError("");
        setStatus("Calling /api/v1/login...");
        setLoading(true);

        var username = document.getElementById("username").value.trim();
        var password = document.getElementById("password").value;

        try {
            var response = await fetch("/api/v1/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: username, password: password })
            });

            var raw = await response.text();
            var payload = {};
            if (raw) {
                try {
                    payload = JSON.parse(raw);
                } catch (parseError) {
                    payload = {};
                }
            }

            if (!response.ok || !payload.accessToken) {
                var backendMessage = extractMessage(payload);
                var statusMessage = "Login failed (" + response.status + ").";
                throw new Error(backendMessage ? backendMessage : statusMessage);
            }

            saveToken(payload.accessToken);
            if (payload.token) {
                localStorage.setItem(REFRESH_KEY, payload.token);
            }

            setSuccess("Login successful. Opening Swagger...");
            openSwaggerAndAuthorize(payload.accessToken, { validate: false });
        } catch (error) {
            setError(error && error.message ? error.message : "Unable to login");
        } finally {
            setLoading(false);
        }
    });
})();
</script>
</body>
</html>
